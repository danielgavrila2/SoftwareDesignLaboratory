spring.application.name=MVC-App
server.port=8080

# CORS
fitcore.cors.allowed-origins=http://localhost:4200

# JWT Configuration
fitcore.jwt.secret=fitcore-super-secret-key-2026-must-be-at-least-256-bits-long-for-hs256
fitcore.jwt.expiration=86400000

# ==========================================
# PROFILE: dev (H2 in-memory - default)
# ==========================================
spring.profiles.active=dev

# ==========================================
# PROFILE: prod (PostgreSQL)
# Activate with: --spring.profiles.active=prod
# ==========================================

# External API (API Ninjas - free tier, register at api-ninjas.com)
fitcore.api-ninjas.key=YOUR_API_NINJAS_KEY_HERE
fitcore.api-ninjas.base-url=https://api.api-ninjas.com/v1
